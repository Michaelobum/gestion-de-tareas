name: 🔔 Recordatorios de Tareas

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos
  workflow_dispatch:           # también se puede correr manualmente

jobs:
  check-reminders:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # necesario para hacer commit de vuelta

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verificar y enviar recordatorios
        env:
          EMAILJS_SERVICE_ID:  ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY:  ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          RECIPIENT_EMAIL:     ${{ secrets.RECIPIENT_EMAIL }}
        run: python3 .github/scripts/check_reminders.py

      - name: Guardar cambios (reminderSent)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tareas.json
          git diff --staged --quiet || git commit -m "chore: marcar recordatorios enviados [skip ci]"
          git push
